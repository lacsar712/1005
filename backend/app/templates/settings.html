{% extends 'base.html' %}

{% block content %}
<div class="mb-8">
    <div class="flex items-center text-sm text-gray-500 mb-4">
        <a href="{{ url_for('index') }}" class="hover:text-primary transition flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            返回首页
        </a>
    </div>
    <h1 class="text-3xl font-bold text-gray-900 mb-2">站点设置</h1>
    <p class="text-gray-500">配置站点基本信息、上传限制与展示选项</p>
</div>

<div class="max-w-3xl">
    <form method="POST" action="{{ url_for('save_site_settings') }}" class="space-y-8" onsubmit="return handleFormSubmit(this)">

        <div class="bg-white rounded-xl shadow-sm p-8 border border-gray-100 space-y-6">
            <h2 class="text-xl font-semibold text-gray-900 flex items-center pb-2 border-b border-gray-100">
                <svg class="w-5 h-5 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                基本信息
            </h2>

            <div>
                <label for="site_name" class="block text-sm font-medium text-gray-700 mb-2">站点名称</label>
                <p class="text-xs text-gray-500 mb-2">将显示在导航栏 Logo 位置和页面标题</p>
                <input type="text" name="site_name" id="site_name" required maxlength="100" value="{{ config.site_name }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
            </div>

            <div>
                <label for="welcome_message" class="block text-sm font-medium text-gray-700 mb-2">首页欢迎语</label>
                <p class="text-xs text-gray-500 mb-2">显示在首页相册列表上方的欢迎文字</p>
                <input type="text" name="welcome_message" id="welcome_message" maxlength="200" value="{{ config.welcome_message }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
            </div>

            <div>
                <label for="copyright_text" class="block text-sm font-medium text-gray-700 mb-2">页脚版权文案</label>
                <p class="text-xs text-gray-500 mb-2">显示在页面底部的版权信息</p>
                <input type="text" name="copyright_text" id="copyright_text" maxlength="200" value="{{ config.copyright_text }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
            </div>

            <div>
                <label for="contact_email" class="block text-sm font-medium text-gray-700 mb-2">联系邮箱</label>
                <p class="text-xs text-gray-500 mb-2">显示在页脚「联系我们」区域</p>
                <input type="email" name="contact_email" id="contact_email" maxlength="100" value="{{ config.contact_email }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-8 border border-gray-100 space-y-6">
            <h2 class="text-xl font-semibold text-gray-900 flex items-center pb-2 border-b border-gray-100">
                <svg class="w-5 h-5 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                上传设置
            </h2>

            <div>
                <label for="max_upload_size_mb" class="block text-sm font-medium text-gray-700 mb-2">
                    单文件上传大小上限
                    <span id="size_value" class="ml-2 text-primary font-semibold">{{ config.max_upload_size_mb }} MB</span>
                </label>
                <p class="text-xs text-gray-500 mb-3">可设置范围：1 – 10 MB（滑动调整）</p>
                <input type="range" name="max_upload_size_mb" id="max_upload_size_mb"
                    min="1" max="10" step="1" value="{{ config.max_upload_size_mb }}"
                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                <div class="flex justify-between text-xs text-gray-400 mt-1">
                    <span>1 MB</span>
                    <span>10 MB</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-8 border border-gray-100 space-y-6">
            <h2 class="text-xl font-semibold text-gray-900 flex items-center pb-2 border-b border-gray-100">
                <svg class="w-5 h-5 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                展示设置
            </h2>

            <div>
                <label for="album_sort_by" class="block text-sm font-medium text-gray-700 mb-2">首页相册默认排序方式</label>
                <select name="album_sort_by" id="album_sort_by"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition bg-white">
                    <option value="created_at" {% if config.album_sort_by == 'created_at' %}selected{% endif %}>创建时间（最新优先）</option>
                    <option value="photo_count" {% if config.album_sort_by == 'photo_count' %}selected{% endif %}>照片数量（从多到少）</option>
                    <option value="name" {% if config.album_sort_by == 'name' %}selected{% endif %}>名称（A-Z 字母序）</option>
                </select>
            </div>

            <div class="flex items-start">
                <div class="flex items-center h-6">
                    <input type="checkbox" name="show_site_stats" id="show_site_stats" value="true"
                        {% if config.show_site_stats == 'true' %}checked{% endif %}
                        class="h-5 w-5 text-primary focus:ring-primary border-gray-300 rounded cursor-pointer">
                </div>
                <div class="ml-3">
                    <label for="show_site_stats" class="text-sm font-medium text-gray-700 cursor-pointer">展示全站统计摘要</label>
                    <p class="text-xs text-gray-500 mt-1">在首页显示相册总数、照片总数、标签数、评论数等统计数据</p>
                </div>
            </div>
        </div>

        <div class="flex justify-end">
            <button type="submit" class="px-8 py-3 bg-primary hover:bg-blue-600 text-white rounded-lg shadow-sm transition flex items-center text-base font-medium">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                保存设置
            </button>
        </div>

    </form>
</div>

<script>
    const sizeSlider = document.getElementById('max_upload_size_mb');
    const sizeValue = document.getElementById('size_value');
    sizeSlider.addEventListener('input', function() {
        sizeValue.textContent = this.value + ' MB';
    });
</script>
{% endblock %}
