version: '3.8'

x-web-common: &web-common
  build:
    context: ./backend
  restart: always
  deploy:
    resources:
      limits:
        memory: 1.5GB
  volumes:
    - ./data:/app/data
    - ./uploads:/app/app/static/uploads
  environment:
    &web-common-env
    SECRET_KEY: dev-secret-key-1005

services:
  web:
    <<: *web-common
    container_name: web-1005
    ports:
      - "31005:8000"
      - "41005:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./uploads:/app/app/static/uploads
    environment:
      <<: *web-common-env
      FLASK_APP: app.app
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 80
      FLASK_DEBUG: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web-dev:
    <<: *web-common
    container_name: web-1005-dev
    profiles: ["dev"]
    ports:
      - "31005:8000"
      - "41005:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./uploads:/app/app/static/uploads
    environment:
      <<: *web-common-env
      FLASK_APP: app.app
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 80
      FLASK_DEBUG: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web-prod:
    <<: *web-common
    container_name: web-1005-prod
    profiles: ["prod"]
    ports:
      - "31005:8000"
    environment:
      <<: *web-common-env
      FLASK_DEBUG: 0
      FLASK_ENV: production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
